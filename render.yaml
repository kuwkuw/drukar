# Render Blueprint — https://render.com/docs/blueprint-spec
#
# NOTE: the live services were created manually in the Render dashboard (not via
# Blueprint), so this file *documents* that deployment rather than driving it.
# It stays deployable: dashboard → New → Blueprint would recreate the same shape.
# See docs/knowledge/features/F-007-ci-cd-and-deployment.md.
#
# Live API: https://drukar.onrender.com (health: /healthz)
#
# Demo posture as deployed: real LLM (Gemini via the openai-compat provider) +
# real Tripo3D generation. The API has no auth/rate limiting, so both keys are
# spendable by anyone who finds the endpoint — keep them capped/free-tier, and
# flip DRUKAR_PROVIDER=mock to stop generation spend without redeploying.
#
# Free-tier caveats: the API sleeps after ~15 min idle (first request cold-starts)
# and job state is ephemeral — history resets on every deploy/restart.

services:
  - name: drukar
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: DRUKAR_PROVIDER
        value: tripo
      - key: TRIPO_API_KEY
        sync: false # set in the Render dashboard
      - key: DRUKAR_LLM_PROVIDER
        value: openai
      - key: DRUKAR_LLM_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: DRUKAR_MODEL
        value: gemini-2.5-flash
      - key: DRUKAR_LLM_API_KEY
        sync: false # set in the Render dashboard; free-tier Gemini key

  - name: drukar-web
    type: web
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @drukar/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: '22'
    routes:
      # Same-origin /api proxy to the live API, mirroring apps/web/nginx.conf.
      - type: rewrite
        source: /api/*
        destination: https://drukar.onrender.com/api/*
      # SPA fallback
      - type: rewrite
        source: /*
        destination: /index.html
