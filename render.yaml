# Render Blueprint — https://render.com/docs/blueprint-spec
#
# NOTE: this Blueprint DRIVES the deployment (connected 2026-07-15; it adopted
# the originally hand-created service by name + type match). Every push to main
# syncs it. Caveat: on sync, any field omitted here reverts to Render's default —
# this file must stay a complete description of the service, not a partial one.
# See docs/knowledge/features/F-007-ci-cd-and-deployment.md.
#
# Live: https://drukar.onrender.com — ONE service is the whole product: the API
# image also builds the SPA and serves it via @fastify/static (DRUKAR_WEB_DIST),
# so UI + API are same-origin by construction. No static site, no rewrites.
#
# Demo posture as deployed: real LLM (Gemini via the openai-compat provider) +
# real Tripo3D generation. The API has no auth, but per-IP rate limiting is on
# by default (see .env.example) and DRUKAR_TRUST_PROXY keys the limits on the
# real client IP behind Render's proxy. Keys stay capped/free-tier regardless,
# and flipping DRUKAR_PROVIDER=mock stops generation spend without redeploying.
#
# Free-tier caveats: the service sleeps after ~15 min idle (first request
# cold-starts) and job state is ephemeral — history resets on deploy/restart.

services:
  - name: drukar # must match the live service exactly — Blueprint adoption keys on name + type
    type: web
    runtime: docker
    plan: free
    region: oregon # region is fixed at creation
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    # Deploy on push to main only after GitHub checks (ci.yml) are green.
    autoDeployTrigger: checksPass
    # Skip rebuilds for changes that can't affect the image (the Dockerfile
    # COPYs the whole repo, so filter by what's provably build-irrelevant).
    buildFilter:
      ignoredPaths:
        - docs/**
        - '**/*.md'
        - .github/**
        - .claude/**
    envVars:
      - key: DRUKAR_PROVIDER
        value: tripo
      - key: TRIPO_API_KEY
        sync: false # set in the Render dashboard
      - key: DRUKAR_LLM_PROVIDER
        value: openai
      - key: DRUKAR_LLM_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: DRUKAR_MODEL
        value: gemini-2.5-flash
      - key: DRUKAR_LLM_API_KEY
        sync: false # set in the Render dashboard; free-tier Gemini key
      - key: DRUKAR_TRUST_PROXY
        value: 'true' # behind Render's proxy; rate-limit on the real client IP
