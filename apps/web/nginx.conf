server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API + SSE proxy. Buffering must stay off or SSE chunks get held back.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /healthz {
        proxy_pass http://api:3000;
    }

    location / {
        try_files $uri /index.html;
    }
}
