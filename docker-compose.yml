services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DRUKAR_DATA_DIR: /data
      DRUKAR_API_HOST: 0.0.0.0
      DRUKAR_API_PORT: '3000'
    volumes:
      - drukar-data:/data
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://localhost:3000/healthz'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  drukar-data:
